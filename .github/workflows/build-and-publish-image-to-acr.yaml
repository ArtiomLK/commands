name: Build & Publish to ACR

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        required: true
        type: string
      ACR_REPO_NAME:
        required: true
        type: string
      IMAGE_TAG:
        required: false
        type: string
        default: 'latest'
    secrets:
      ACR_LOGIN_SERVER:
        required: true
      ACR_TOKEN_NAME:
        required: true
      ACR_TOKEN_PASS:
        required: true
    outputs:
      image-digest:
        description: 'Image digest from the build'
        value: ${{ jobs.build-and-publish-container-image.outputs.digest }}

jobs:
  build-and-publish-container-image:
    runs-on: ubuntu-latest
    environment: ${{ inputs.ENVIRONMENT }}
    outputs:
      digest: ${{ steps.build-and-push.outputs.digest }}
    steps:
    - uses: actions/checkout@v6

    - name: Login to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_TOKEN_NAME }}
        password: ${{ secrets.ACR_TOKEN_PASS }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      id: build-and-push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.ACR_REPO_NAME }}:${{ github.sha }}
          ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.ACR_REPO_NAME }}:${{ inputs.IMAGE_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
